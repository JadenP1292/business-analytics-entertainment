name: Scrape Canon News → Snowflake RAW

on:
  schedule:
    - cron: "0 9 * * *"  # Daily at 9:00 UTC (staggered from Best Buy job)
  workflow_dispatch:       # Allow manual trigger

jobs:
  scrape:
    name: Scrape Canon News & Load to Snowflake
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrape script
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: RAW
        run: python scripts/scrape_canon_news.py

      - name: Commit new knowledge/raw files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge/raw/
          git diff --cached --quiet || git commit -m "chore: add scraped Canon news articles [skip ci]"
          git push
